name: Build Plugin

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test
        run: dotnet test --configuration Release --no-build --verbosity normal

      - name: Package plugin
        run: |
          mkdir -p artifact
          cp Jellyfin.Plugin.Letterboxd/bin/Release/net9.0/Jellyfin.Plugin.Letterboxd.dll artifact/
          cd artifact && zip -r ../letterboxd-ratings.zip . && cd ..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: letterboxd-ratings
          path: letterboxd-ratings.zip

      # ---- The steps below only run on version tags (v1.0.0.0 etc.) ----

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: letterboxd-ratings.zip
          generate_release_notes: true

      - name: Update plugin repository manifest
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          python3 .github/update_manifest.py \
            --zip letterboxd-ratings.zip \
            --tag "${GITHUB_REF_NAME}" \
            --repo "${GITHUB_REPOSITORY}"

      - name: Commit manifest to main
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout main
          git add manifest.json
          git commit -m "Update plugin manifest for ${GITHUB_REF_NAME}" || echo "No changes"
          git push origin main
